# 🚀 CI/CD Pipeline — Smart Shopping List
#
# Ejecuta pruebas unitarias, pruebas instrumentadas en emulador,
# y genera reportes de cobertura con Kover en cada push a main
# y en cada Pull Request.

name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # 1. Pruebas unitarias + cobertura
  # ═══════════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests + Kover Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: 🧪 Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: 📊 Generate Kover coverage report
        run: ./gradlew koverXmlReport --stacktrace

      - name: 📤 Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          retention-days: 7

      - name: 📤 Upload Kover coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kover-coverage-report
          path: app/build/reports/kover/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════
  # 2. Pruebas de UI en emulador Android
  # ═══════════════════════════════════════════════════════════════════
  ui-tests:
    name: UI Tests (Emulator)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: 🎭 Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 📱 Run UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: 📤 Upload UI test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-report
          path: app/build/reports/androidTests/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════
  # 3. Lint
  # ═══════════════════════════════════════════════════════════════════
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: 🔍 Run Android lint
        run: ./gradlew lintDebug

      - name: 📤 Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results*
          retention-days: 7
